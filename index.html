<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meetu</title>
    
    <!-- Google Fonts theke Poppins add kora holo -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        /* Font family update kora holo */
        body { font-family: 'Poppins', sans-serif; text-align: center; background: #1e1e1e; color: white; padding: 20px; margin: 0; }
        .container { background: #2d2d2d; padding: 20px; border-radius: 10px; max-width: 800px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        /* Buttons: Font inherit kora holo jate Poppins pay */
        button { font-family: 'Poppins', sans-serif; padding: 5px 10px; margin: 5px; cursor: pointer; border: none; border-radius: 0; font-weight: 600; font-size: 12px; transition: 0.3s; }
        button:hover { opacity: 0.8; }
        .btn-blue { background: #0b5ed7; color: white; }
        .btn-green { background: #198754; color: white; }
        .btn-red { background: #dc3545; color: white; }
        .btn-gray { background: #6c757d; color: white; }
        
        /* Square Control Buttons */
        .btn-square { width: 45px; height: 45px; display: inline-flex; align-items: center; justify-content: center; padding: 0; font-size: 18px; border-radius: 0; }
        
        /* Circular End Call Button */
        .btn-end-circle { font-family: 'Poppins', sans-serif; width: 45px; height: 45px; border-radius: 50%; background: #dc3545; color: white; font-size: 20px; display: inline-flex; align-items: center; justify-content: center; padding: 0; border: 2px solid #fff; }
        
        input { font-family: 'Poppins', sans-serif; padding: 8px; width: 85%; margin: 10px 0; border-radius: 0; border: 1px solid #555; background: #111; color: #fff; text-align: center; font-size: 12px; }
        
        #status { color: #ffc107; margin: 10px 0; font-size: 14px; font-weight: 600; }
        #controlsPanel { display: none; margin-top: 15px; padding: 10px; background: #222; border-radius: 0; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        /* Video Section Styling */
        .video-wrapper { display: flex; justify-content: center; gap: 15px; flex-wrap: wrap; margin-top: 20px; display: none; }
        .video-box { position: relative; background: #000; border: 2px solid #444; border-radius: 0; overflow: hidden; }
        .local-box { width: 250px; height: 180px; }
        .remote-box { width: 100%; max-width: 600px; height: auto; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; bottom: 5px; left: 5px; background: rgba(0,0,0,0.7); color: white; padding: 3px 8px; font-size: 10px; }

        /* Modal / Popup Styling */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: #333; padding: 20px; border: 1px solid #555; text-align: center; width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .modal-content h3 { margin-top: 0; color: #0dcaf0; }
        .modal-buttons { margin-top: 15px; display: flex; justify-content: center; gap: 10px; }
        .modal-buttons button { padding: 8px 15px; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>🌐 Meetu</h2>
        <div id="status">System is getting ready...</div>
        
        <!-- Host Setup Panel -->
        <div id="hostPanel" style="display:none;">
            <button class="btn-blue" id="setupBtn" onclick="startSetupFlow('host')">Configure Media & Start</button>
            
            <div id="linkSetupPanel" style="display:none; margin-top:15px;">
                <button class="btn-green" onclick="generateLink()">Generate Meeting Link</button><br>
                <input type="text" id="inviteLink" readonly placeholder="Link will appear here..." onclick="this.select()">
            </div>
        </div>

        <!-- Guest Setup Panel -->
        <div id="guestPanel" style="display:none;">
            <button class="btn-blue" id="guestSetupBtn" onclick="startSetupFlow('guest')">Configure Media to Join</button>
            <button class="btn-green" id="joinBtn" style="display:none;" onclick="requestJoin()">Request to Join</button>
        </div>

        <!-- Meet Controls (For Both) -->
        <div id="controlsWrapper" style="display:none;">
            <div id="controlsPanel">
                <button class="btn-square btn-gray" id="micBtn" onclick="toggleMic()" title="Mic On">🎤</button>
                <button class="btn-square btn-gray" id="camBtn" onclick="toggleCam()" title="Cam On">📷</button>
                <button class="btn-square btn-blue" id="screenBtn" onclick="toggleScreen()" title="Share Screen">💻</button>
                <button class="btn-end-circle" onclick="endCall()" title="End Call">📞</button>
            </div>
        </div>

        <!-- Video Containers -->
        <div class="video-wrapper" id="videoWrapper">
            <div class="video-box local-box">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="label" id="localLabel">Local (You)</div>
            </div>
            
            <div class="video-box remote-box" id="remoteBox">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="label" id="remoteLabel">Partner</div>
            </div>
        </div>
    </div>

    <!-- 2-Step Setup Modal -->
    <div id="setupModal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modalTitle">Camera Setup</h3>
            <p id="modalDesc">Do you want to join with your camera turned on?</p>
            <div class="modal-buttons">
                <button onclick="handleSetupChoice(true)" class="btn-green">Yes, Turn On</button>
                <button onclick="handleSetupChoice(false)" class="btn-red">No, Keep Off</button>
            </div>
        </div>
    </div>

    <script>
        const peer = new Peer({
            config: { 'iceServers': [ { urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' } ] }
        });

        let localStream, currentCall, connectedPartnerId = null;
        let isMicOn = false, isCamOn = false, isScreenSharing = false; 
        let userRole = 'host';
        
        let setupStage = 0; // 0 = cam, 1 = mic
        let userChoices = { cam: false, mic: false };
        let currentUserRoleFlow = '';

        const urlParams = new URLSearchParams(window.location.search);
        const hostIdFromUrl = urlParams.get('room');

        peer.on('open', id => {
            if(hostIdFromUrl) {
                userRole = 'guest';
                document.getElementById('guestPanel').style.display = 'block';
                document.getElementById('status').innerText = "You are a Guest. Please configure your media.";
            } else {
                document.getElementById('hostPanel').style.display = 'block';
                document.getElementById('status').innerText = "You are the Host. Please configure your media.";
            }
        });

        // ==========================
        // 2-Step Modal Setup Flow
        // ==========================
        function startSetupFlow(role) {
            currentUserRoleFlow = role;
            setupStage = 0;
            document.getElementById('setupModal').style.display = 'flex';
            updateModalUI();
        }

        function updateModalUI() {
            if(setupStage === 0) {
                document.getElementById('modalTitle').innerText = "📸 Camera Setup";
                document.getElementById('modalDesc').innerText = "Do you want to start with your camera on?";
            } else if(setupStage === 1) {
                document.getElementById('modalTitle').innerText = "🎤 Microphone Setup";
                document.getElementById('modalDesc').innerText = "Do you want to start with your microphone on?";
            }
        }

        function handleSetupChoice(choice) {
            if(setupStage === 0) {
                userChoices.cam = choice;
                setupStage = 1;
                updateModalUI();
            } else if(setupStage === 1) {
                userChoices.mic = choice;
                document.getElementById('setupModal').style.display = 'none';
                finalizeMediaSetup();
            }
        }

        // ==========================
        // Apply Initial Media Setup
        // ==========================
        async function finalizeMediaSetup() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                
                isCamOn = userChoices.cam;
                isMicOn = userChoices.mic;

                localStream.getVideoTracks()[0].enabled = isCamOn;
                localStream.getAudioTracks()[0].enabled = isMicOn; 
                
                const localVideo = document.getElementById('localVideo');
                localVideo.srcObject = localStream;
                document.getElementById('videoWrapper').style.display = 'flex';
                document.getElementById('controlsWrapper').style.display = 'block';

                updateControlButtonsUI();

                if(currentUserRoleFlow === 'host') {
                    document.getElementById('setupBtn').style.display = 'none';
                    document.getElementById('linkSetupPanel').style.display = 'block';
                    document.getElementById('status').innerText = "Media configured. Generate a link to invite.";
                } else {
                    document.getElementById('guestSetupBtn').style.display = 'none';
                    document.getElementById('joinBtn').style.display = 'inline-block';
                    document.getElementById('status').innerText = "Media configured. You can now request to join.";
                }
            } catch(e) {
                alert("Camera or Microphone permission denied. Please check browser settings.");
            }
        }

        function updateControlButtonsUI() {
            const micBtn = document.getElementById('micBtn');
            micBtn.innerText = isMicOn ? "🎤" : "🔇";
            micBtn.title = isMicOn ? "Mic On" : "Mic Off";
            micBtn.className = isMicOn ? "btn-square btn-gray" : "btn-square btn-red";
            
            const camBtn = document.getElementById('camBtn');
            camBtn.innerText = isCamOn ? "📷" : "🚫";
            camBtn.title = isCamOn ? "Cam On" : "Cam Off";
            camBtn.className = isCamOn ? "btn-square btn-gray" : "btn-square btn-red";
        }

        // ==========================
        // Connection Logic
        // ==========================
        
        peer.on('connection', conn => {
            conn.on('data', data => {
                if(data.type === 'request_join') {
                    let admit = confirm("A guest wants to join the meeting. Admit?");
                    if(admit) {
                        connectedPartnerId = conn.peer;
                        conn.send({ type: 'accepted' });
                        document.getElementById('status').innerText = "Guest admitted. Connecting call...";
                        document.getElementById('linkSetupPanel').style.display = 'none';
                        
                        currentCall = peer.call(connectedPartnerId, localStream);
                        handleCallStream(currentCall);
                    } else {
                        conn.send({ type: 'rejected' });
                    }
                }
            });
        });

        function requestJoin() {
            document.getElementById('status').innerText = "Request sent. Waiting for host's permission...";
            document.getElementById('joinBtn').style.display = 'none';
            
            const conn = peer.connect(hostIdFromUrl);
            conn.on('open', () => conn.send({ type: 'request_join' }));
            
            conn.on('data', data => {
                if(data.type === 'accepted') {
                    document.getElementById('status').innerText = "Admitted! Connecting to host...";
                } else if(data.type === 'rejected') {
                    document.getElementById('status').innerText = "The host rejected your join request.";
                    document.getElementById('joinBtn').style.display = 'inline-block';
                }
            });
        }

        peer.on('call', call => {
            connectedPartnerId = call.peer;
            call.answer(localStream); 
            currentCall = call;
            handleCallStream(currentCall);
        });

        function handleCallStream(callObj) {
            callObj.on('stream', remoteStream => {
                const remoteVideo = document.getElementById('remoteVideo');
                remoteVideo.srcObject = remoteStream;
                document.getElementById('remoteBox').style.display = 'block';
                document.getElementById('status').innerText = "Connected successfully.";
            });
            callObj.on('close', () => {
                document.getElementById('status').innerText = "Partner has left the meeting.";
                document.getElementById('remoteBox').style.display = 'none';
                resetUI();
            });
        }

        function generateLink() {
            const link = window.location.origin + window.location.pathname + "?room=" + peer.id;
            document.getElementById('inviteLink').value = link;
            document.getElementById('status').innerText = "Link generated. Share it with your partner.";
        }

        // ==========================
        // Controls (Mic, Cam, Screen)
        // ==========================
        function toggleMic() {
            if(!localStream) return;
            isMicOn = !isMicOn;
            localStream.getAudioTracks()[0].enabled = isMicOn;
            updateControlButtonsUI();
        }

        function toggleCam() {
            if(!localStream) return;
            isCamOn = !isCamOn;
            localStream.getVideoTracks()[0].enabled = isCamOn;
            updateControlButtonsUI();
        }

        async function toggleScreen() {
            if (!isScreenSharing) {
                try {
                    const screenStream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
                    
                    const audioCtx = new AudioContext();
                    const dest = audioCtx.createMediaStreamDestination();
                    
                    if (localStream && localStream.getAudioTracks().length > 0) {
                        audioCtx.createMediaStreamSource(localStream).connect(dest);
                    }
                    if (screenStream.getAudioTracks().length > 0) {
                        audioCtx.createMediaStreamSource(screenStream).connect(dest);
                    }
                    
                    const mixedAudioTrack = dest.stream.getAudioTracks()[0];
                    const screenVideoTrack = screenStream.getVideoTracks()[0];
                    
                    if (currentCall) {
                        const senderVideo = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                        const senderAudio = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'audio');
                        if(senderVideo) senderVideo.replaceTrack(screenVideoTrack);
                        if(senderAudio) senderAudio.replaceTrack(mixedAudioTrack);
                    }

                    document.getElementById('localVideo').srcObject = new MediaStream([screenVideoTrack]);
                    document.getElementById('localLabel').innerText = "Local (Screen)";
                    
                    isScreenSharing = true;
                    const screenBtn = document.getElementById('screenBtn');
                    screenBtn.innerText = "🛑";
                    screenBtn.title = "Stop Screen";
                    screenBtn.className = "btn-square btn-red";

                    screenVideoTrack.onended = () => toggleScreen(); 
                } catch(e) {
                    console.error("Screen share cancelled", e);
                }
            } else {
                const camVideoTrack = localStream.getVideoTracks()[0];
                const originalMicTrack = localStream.getAudioTracks()[0];
                
                if (currentCall) {
                    const senderVideo = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'video');
                    const senderAudio = currentCall.peerConnection.getSenders().find(s => s.track.kind === 'audio');
                    if(senderVideo) senderVideo.replaceTrack(camVideoTrack);
                    if(senderAudio) senderAudio.replaceTrack(originalMicTrack);
                }

                document.getElementById('localVideo').srcObject = localStream;
                document.getElementById('localLabel').innerText = "Local (You)";
                isScreenSharing = false;
                const screenBtn = document.getElementById('screenBtn');
                screenBtn.innerText = "💻";
                screenBtn.title = "Share Screen";
                screenBtn.className = "btn-square btn-blue";
            }
        }

        function endCall() {
            if(localStream) localStream.getTracks().forEach(track => track.stop());
            if(currentCall) currentCall.close();
            resetUI();
            window.location.reload(); 
        }

        function resetUI() {
            document.getElementById('videoWrapper').style.display = 'none';
            document.getElementById('controlsWrapper').style.display = 'none';
            document.getElementById('status').innerText = "Call ended.";
        }
    </script>
</body>
</html>
